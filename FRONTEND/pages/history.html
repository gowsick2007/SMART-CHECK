<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance History — Smart Attendance</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="bg-animate"></div>
  <div id="toast-container" class="toast-container"></div>

  <aside class="sidebar">
    <div class="sidebar-logo"><i class="fa-solid fa-shield-halved"></i><span>SmartCheck</span></div>
    <nav class="nav-menu">
      <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a>
      <a href="history.html" class="nav-link active"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a>
      <a href="auto_verification.html" class="nav-link"><i class="fa-solid fa-bolt"></i><span>Auto Verify</span></a>
      <a href="profile.html" class="nav-link"><i class="fa-solid fa-user-graduate"></i><span>Profile</span></a>
      <a href="settings.html" class="nav-link"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
    </nav>
    <div style="margin-top: auto;">
      <a href="#" onclick="handleLogout()" class="nav-link" style="color: var(--accent-red);"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
    </div>
  </aside>

  <main class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
      <h1 style="font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 800;">Verification History</h1>
      <div style="display: flex; gap: 15px;">
        <input type="text" id="history-search" placeholder="Search by date or status..." class="glass-card" style="padding: 10px 20px; border-radius: 12px; font-size: 14px; width: 300px; background: rgba(0,0,0,0.3); color: #ffffff;">
        <button class="glass-card" style="padding: 10px 20px; border-radius: 12px; background: var(--accent-cyan); color: #000; font-weight: 700; border: none; cursor: pointer;">Export PDF</button>
      </div>
    </div>

    <div class="glass-card" style="padding: 10px;">
      <table class="premium-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Boundary</th>
            <th>Face Match</th>
            <th>Distance</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="history-table-body">
          <!-- Rows will be populated by JS -->
          <tr>
            <td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">Loading historical records...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/auto_verification.js"></script>
  <script src="../js/history.js"></script>
</body>
</html>
