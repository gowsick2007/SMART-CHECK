<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Campus Boundary</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #0a0f1e;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
    }

    .topbar {
      display: flex;
      align-items: center;
      padding: 24px 32px;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-right: 20px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .header-text h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    .header-text p {
      margin: 4px 0 0 0;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .map-card {
      background: #0b1120;
      border: 1px solid rgba(0, 255, 204, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
      border-radius: 16px;
      overflow: hidden;
      margin-top: 20px;
      display: flex;
      flex-direction: column;
    }

    .search-box {
      padding: 16px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .search-box input {
      width: 100%;
      height: 48px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      padding: 0 16px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      box-sizing: border-box;
      outline: none;
    }

    .search-box input:focus {
      border-color: #00ffcc;
    }

    #map {
      width: 100%;
      height: 420px;
      background: #111;
    }

    .info-section {
      padding: 24px;
      background: #0b1120;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .info-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .info-item span {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-item strong {
      font-size: 15px;
      color: #fff;
      word-break: break-all;
    }

    .actions {
      display: flex;
      gap: 16px;
    }

    .btn {
      flex: 1;
      height: 48px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      border: none;
    }

    .btn-confirm {
      background: linear-gradient(135deg, #00d4c8, #00b4aa);
      color: #ffffff;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .btn-confirm:hover {
      opacity: 0.9;
    }

    .btn-skip {
      background: transparent;
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-skip:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="back-btn" onclick="window.history.back()">
      <i class="fa-solid fa-arrow-left"></i>
    </div>
    <div class="header-text">
      <h1>Select Campus Boundary</h1>
      <p>Confirm your college location for attendance tracking</p>
    </div>
  </div>

  <div class="container">
    <div class="map-card">
      <div class="search-box">
        <input type="text" id="pac-input" placeholder="Search for your college..." />
      </div>
      <div id="map"></div>
      <div class="info-section">
        <div class="info-grid">
          <div class="info-item">
            <span>Selected Location</span>
            <strong id="loc-name">Loading...</strong>
          </div>
          <div class="info-item">
            <span>Coordinates</span>
            <strong id="loc-coords">Lat: -, Lng: -</strong>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-skip" onclick="skipLocation()">Use Default Location</button>
          <button class="btn btn-confirm" onclick="confirmLocation()" id="confirmBtn">Confirm This Location</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (!localStorage.getItem('sat_token')) {
      window.location.href = '/';
    }

    let map;
    let marker;
    let circle;
    let currentLat = 20.5937;
    let currentLng = 78.9629;
    const BOUNDARY_RADIUS = 22.5;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: currentLat, lng: currentLng },
        zoom: 5,
        styles: [
          { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
          { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
          { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
          { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] }
        ]
      });

      marker = new google.maps.Marker({
        map,
        draggable: true,
        animation: google.maps.Animation.DROP,
        position: { lat: currentLat, lng: currentLng },
      });

      circle = new google.maps.Circle({
        strokeColor: "#00ffcc",
        strokeOpacity: 0.8,
        strokeWeight: 2,
        fillColor: "#00ffcc",
        fillOpacity: 0.35,
        map,
        center: { lat: currentLat, lng: currentLng },
        radius: BOUNDARY_RADIUS,
      });

      const input = document.getElementById("pac-input");
      const searchBox = new google.maps.places.SearchBox(input);

      map.addListener("bounds_changed", () => {
        searchBox.setBounds(map.getBounds());
      });

      searchBox.addListener("places_changed", () => {
        const places = searchBox.getPlaces();
        if (places.length == 0) return;

        const place = places[0];
        if (!place.geometry || !place.geometry.location) return;

        updateMarkerPosition(place.geometry.location.lat(), place.geometry.location.lng(), place.name);

        if (place.geometry.viewport) {
          map.fitBounds(place.geometry.viewport);
        } else {
          map.setCenter(place.geometry.location);
          map.setZoom(17);
        }
      });

      marker.addListener("dragend", () => {
        const pos = marker.getPosition();
        updateMarkerPosition(pos.lat(), pos.lng(), "Custom Pinned Location");
      });

      // Try HTML5 geolocation
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((position) => {
          updateMarkerPosition(position.coords.latitude, position.coords.longitude, "Current Location");
          map.setCenter({ lat: position.coords.latitude, lng: position.coords.longitude });
          map.setZoom(17);
        });
      }
    }

    function updateMarkerPosition(lat, lng, name) {
      currentLat = lat;
      currentLng = lng;
      marker.setPosition({ lat, lng });
      circle.setCenter({ lat, lng });

      document.getElementById('loc-name').textContent = name;
      document.getElementById('loc-coords').textContent = `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`;
    }

    function skipLocation() {
      // Logic from auth.js success
      redirectAfterLogin();
    }

    async function confirmLocation() {
      const btn = document.getElementById('confirmBtn');
      btn.textContent = 'Saving...';
      btn.disabled = true;

      localStorage.setItem('campusLat', currentLat);
      localStorage.setItem('campusLng', currentLng);

      const student = JSON.parse(localStorage.getItem('sat_student') || '{}');
      const student_id = student.student_id || 'unknown';
      const token = localStorage.getItem('sat_token');

      try {
        const res = await fetch('https://smart-check-production.up.railway.app/api/student/set-boundary', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ lat: currentLat, lng: currentLng, student_id })
        });
        const data = await res.json();
      } catch (e) {
        console.error("Failed to save boundary", e);
      }

      redirectAfterLogin();
    }

    function redirectAfterLogin() {
      const role = localStorage.getItem('userRole') || '';
      const student = JSON.parse(localStorage.getItem('sat_student') || '{}');
      const studentRole = student.role || 'student';

      if (role === 'creator') {
        window.location.href = 'dashboard.html';
      } else if (studentRole === 'admin') {
        window.location.replace('/admin_dashboard');
      } else {
        window.location.replace('/student_dashboard');
      }
    }
  </script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBKmoZ8qVLg4d98xuUp2-tAIsFd9YtPaD4&libraries=places&callback=initMap"
    async defer></script>
</body>

</html>
