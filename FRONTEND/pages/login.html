<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Attendance — Login</title>
  <meta name="description" content="Smart Attendance System — Secure AI-powered attendance" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    :root {
      --bg-dark: #0a0f1e;
      --bg-sidebar: #0d1117;
      --accent-cyan: #00ffcc;
      --blue: #4facfe;
      --purple: #667eea;
      --green: #38ef7d;
    }
    html, body {
      min-height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg-dark);
      font-family: 'Inter', sans-serif;
      overflow-y: auto;
    }
    .split-layout {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0f1e, #161e38);
      padding: 60px 20px;
    }
    .login-container-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      width: 100%;
      max-width: 480px;
      z-index: 10;
    }
    
    /* 3D Animated Logo Container */
    .animated-logo-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }
    .pulsing-ring {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid var(--accent-cyan);
      animation: glowPulse 3s infinite ease-out;
      opacity: 0;
      z-index: 1;
    }
    .pulsing-ring:nth-child(2) {
      animation-delay: 1s;
    }
    .logo-icon-3d {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: var(--accent-cyan);
      border: 1px solid rgba(0, 255, 204, 0.3);
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.3), inset 0 0 20px rgba(0, 255, 204, 0.2);
      transform: perspective(500px) rotateX(15deg);
      z-index: 2;
      margin-bottom: 15px;
      animation: float3d 4s infinite ease-in-out;
    }
    .logo-text-3d {
      font-family: 'Outfit', sans-serif;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(to right, #ffffff, var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 5px 15px rgba(0,255,204,0.3);
      z-index: 2;
      text-transform: uppercase;
    }
    
    @keyframes glowPulse {
      0% { transform: scale(0.6); opacity: 0.8; border-color: var(--accent-cyan); }
      100% { transform: scale(1.8); opacity: 0; border-color: transparent; }
    }
    @keyframes float3d {
      0%, 100% { transform: perspective(500px) translateY(0) rotateX(10deg); }
      50% { transform: perspective(500px) translateY(-10px) rotateX(20deg); box-shadow: 0 15px 40px rgba(0, 255, 204, 0.5); }
    }

    .branding-box {
      max-width: 520px;
      margin: 0 auto;
    }
    .app-logo {
      font-size: 48px;
      color: var(--accent-cyan);
      margin-bottom: 20px;
      filter: drop-shadow(0 0 10px rgba(0,255,204,0.3));
    }
    .app-title {
      font-size: 38px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.2;
    }
    .app-subtitle {
      font-size: 18px;
      color: var(--accent-cyan);
      margin-bottom: 50px;
      font-weight: 600;
    }
    .features-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 60px;
    }
    .feature-card {
      display: flex;
      align-items: flex-start;
      gap: 15px;
    }
    .feature-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background: rgba(0, 255, 204, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--accent-cyan);
      flex-shrink: 0;
    }
    .feature-text h4 {
      margin: 0 0 5px 0;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
    }
    .feature-text p {
      margin: 0;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      line-height: 1.4;
    }
    .version-text {
      position: absolute;
      bottom: 40px;
      left: 60px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .form-card {
      width: 480px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 50px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .welcome-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .welcome-title {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
    }
    .welcome-subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
    }
    .login-tabs {
      display: flex;
      border-bottom: 2px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 35px;
    }
    .login-tab {
      flex: 1;
      text-align: center;
      padding: 15px 0;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
    }
    .login-tab::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent-cyan);
      transform: scaleX(0);
      transition: transform 0.3s ease;
      box-shadow: 0 0 10px var(--accent-cyan);
    }
    .login-tab.active {
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }
    .login-tab.active::after {
      transform: scaleX(1);
    }
    .form-control-container {
      position: relative;
      margin-bottom: 25px;
    }
    .form-control-container i {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 18px;
    }
    .form-control-with-icon {
      width: 100%;
      height: 52px;
      background: rgba(0, 0, 0, 0.2) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      border-radius: 12px !important;
      color: #ffffff !important;
      padding: 0 20px 0 50px !important;
      font-size: 16px;
      outline: none !important;
      box-sizing: border-box;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }
    .form-control-with-icon:focus {
      border-color: var(--accent-cyan) !important;
      box-shadow: 0 0 0 4px rgba(0, 255, 204, 0.1) !important;
    }
    .btn-submit {
      background: linear-gradient(135deg, var(--accent-cyan), #00b4aa) !important;
      color: #0a0f1e !important;
      font-family: 'Inter', sans-serif;
      font-weight: 800 !important;
      font-size: 16px !important;
      height: 52px !important;
      width: 100% !important;
      border-radius: 12px !important;
      border: none !important;
      cursor: pointer !important;
      margin-top: 10px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 10px 20px rgba(0, 255, 204, 0.2) !important;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px rgba(0, 255, 204, 0.3) !important;
    }
    .creator-info-box {
      background: rgba(0, 255, 204, 0.05);
      border: 1px solid rgba(0, 255, 204, 0.2);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
      display: none;
      align-items: flex-start;
      gap: 15px;
    }
    .creator-info-box i {
      color: var(--accent-cyan);
      font-size: 24px;
      margin-top: 2px;
    }
    .creator-info-text h5 {
      color: var(--accent-cyan);
      margin: 0 0 5px 0;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .creator-info-text p {
      margin: 0;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      line-height: 1.4;
    }
    .bottom-link {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
    }
    .bottom-link a {
      color: var(--accent-cyan);
      font-weight: 700;
      text-decoration: none;
      margin-left: 5px;
      transition: all 0.2s ease;
    }
    .bottom-link a:hover {
      text-shadow: 0 0 10px rgba(0,255,204,0.4);
    }
    .alert-error {
      background: rgba(220, 53, 69, 0.1) !important;
      border: 1px solid rgba(220, 53, 69, 0.2) !important;
      border-left: 4px solid #dc3545 !important;
      color: #ff6b6b !important;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(10, 15, 30, 0.2);
      border-top-color: #0a0f1e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="toast-container"></div>

<div class="split-layout">
  <div class="login-container-stack">
    
    <!-- 3D SMARTCHECK LOGO -->
    <div class="animated-logo-container">
        <div class="pulsing-ring"></div>
        <div class="pulsing-ring"></div>
        <div class="logo-icon-3d">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <div class="logo-text-3d">SmartCheck</div>
    </div>

    <!-- Login Form Card -->
    <div class="form-card" style="margin-top: 10px;">
      <div class="welcome-header">
        <div class="welcome-title">WELCOME BACK</div>
        <div class="welcome-subtitle">Login to continue</div>
      </div>

      <!-- Login Tabs -->
      <div class="login-tabs">
        <button type="button" class="login-tab active" id="tab-login" onclick="switchLoginType('student')">Student Login</button>
        <button type="button" class="login-tab" onclick="switchLoginType('admin')">Admin Login</button>
        <button type="button" class="login-tab" onclick="switchLoginType('creator')">Creator Login</button>
      </div>

      <div class="creator-info-box" id="creatorHint">
        <i class="fa-solid fa-user-shield"></i>
        <div class="creator-info-text">
          <h5>Super Admin Access</h5>
          <p>Restricted creator-level administrative control.</p>
        </div>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <select id="login-role" style="display:none;">
          <option value="student" selected>Student</option>
          <option value="admin">Administrator</option>
        </select>

        <div class="form-control-container">
          <i class="fa-solid fa-envelope" id="identifier-icon"></i>
          <input type="text" id="login-identifier" class="form-control-with-icon" placeholder="Student Email" required autocomplete="username" />
        </div>

        <div class="form-control-container">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="login-password" class="form-control-with-icon" placeholder="Password" required autocomplete="current-password" style="padding-right: 50px !important;" />
          <i class="fa-regular fa-eye" id="toggle-password" style="position: absolute; right: 20px; left: auto !important; top: 50%; transform: translateY(-50%); cursor: pointer; color: #ffffff; z-index: 20; font-size: 16px;" onclick="togglePasswordVisibility(event)"></i>
        </div>

        <div id="login-error" class="alert alert-error" style="display:none;"></div>

        <button type="submit" class="btn-submit" id="login-btn">
          <span id="login-btn-text">LOGIN AS STUDENT</span>
          <span id="login-spinner" class="spinner" style="display:none"></span>
        </button>

        <div class="bottom-link" id="signup-link-container">
          <div style="margin-bottom: 15px; color: rgba(255,255,255,0.6);">Don't have an account?</div>
          <a href="/register.html" style="display: inline-block; background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); padding: 12px 24px; border-radius: 8px; font-weight: 700; text-decoration: none; font-size: 14px; transition: all 0.3s ease; box-shadow: 0 0 10px rgba(0, 255, 204, 0.1);" onmouseover="this.style.boxShadow='0 0 20px rgba(0, 255, 204, 0.4)'; this.style.background='rgba(0, 255, 204, 0.1)';" onmouseout="this.style.boxShadow='0 0 10px rgba(0, 255, 204, 0.1)'; this.style.background='transparent';">
            Create New Account
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const prefillEmail = localStorage.getItem('prefillEmail');
    if (prefillEmail) {
      document.getElementById('login-identifier').value = prefillEmail;
      localStorage.removeItem('prefillEmail');
    }
  });

  // if (localStorage.getItem('sat_token')) {
  //   window.location.replace('location.html');
  // }

  const identifierInput = document.getElementById('login-identifier');
  const roleSelect = document.getElementById('login-role');
  const iconInput = document.getElementById('identifier-icon');

  function switchLoginType(type) {
    document.querySelectorAll('.login-tab').forEach(tab => tab.classList.remove('active'));
    
    if (type === 'student') {
      event.target.classList.add('active');
      roleSelect.value = 'student';
      identifierInput.placeholder = 'Student Email';
      identifierInput.value = '';
      identifierInput.readOnly = false;
      document.getElementById('creatorHint').style.display = 'none';
      document.getElementById('login-btn-text').textContent = 'LOGIN AS STUDENT';
      document.getElementById('signup-link-container').style.display = 'block';
    } else if (type === 'admin') {
      event.target.classList.add('active');
      roleSelect.value = 'admin';
      identifierInput.placeholder = 'Admin Email';
      identifierInput.value = '';
      identifierInput.readOnly = false;
      document.getElementById('creatorHint').style.display = 'none';
      document.getElementById('login-btn-text').textContent = 'LOGIN AS ADMIN';
      document.getElementById('signup-link-container').style.display = 'none';
    } else if (type === 'creator') {
      event.target.classList.add('active');
      roleSelect.value = 'admin'; // Backend uses admin logic for creator
      identifierInput.value = 'gowsicklitheswaran@gmail.com';
      identifierInput.placeholder = 'Creator Email';
      identifierInput.readOnly = true;
      document.getElementById('creatorHint').style.display = 'flex';
      document.getElementById('login-btn-text').textContent = 'LOGIN AS CREATOR';
      document.getElementById('signup-link-container').style.display = 'none';
    }
  }

  function togglePasswordVisibility(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    const passInput = document.getElementById('login-password');
    const toggleBtn = document.getElementById('toggle-password');
    if (passInput.type === 'password') {
      passInput.type = 'text';
      toggleBtn.classList.remove('fa-regular', 'fa-eye');
      toggleBtn.classList.add('fa-solid', 'fa-eye-slash');
    } else {
      passInput.type = 'password';
      toggleBtn.classList.remove('fa-solid', 'fa-eye-slash');
      toggleBtn.classList.add('fa-regular', 'fa-eye');
    }
  }
</script>
</body>
</html>
