<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Location — Smart Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  
  <!-- Leaflet CDN for premium 100% reliable map container -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg-main: #0a0f1e;
      --accent-cyan: #00ffcc;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .picker-container {
      max-width: 950px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .page-title {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(to right, #00ffcc, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .glass-card {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 255, 204, 0.15);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .search-container {
      position: relative;
      margin-bottom: 20px;
    }

    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 204, 0.3);
      border-radius: 8px;
      padding: 16px 20px;
      padding-left: 50px;
      color: #fff;
      font-size: 1.05rem;
      box-sizing: border-box;
      transition: all 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent-cyan);
      font-size: 1.3rem;
      z-index: 10;
    }

    .autocomplete-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(10, 15, 30, 0.95);
      border: 1px solid rgba(0, 255, 204, 0.3);
      border-top: none;
      border-radius: 0 0 8px 8px;
      z-index: 1000;
      max-height: 250px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .autocomplete-item {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    .autocomplete-item:hover {
      background: rgba(0, 255, 204, 0.1);
      color: var(--accent-cyan);
    }

    #map {
      height: 520px;
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(0, 255, 204, 0.2);
      margin-bottom: 25px;
      z-index: 1;
    }

    .info-panel {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 25px;
    }

    .info-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 15px;
    }

    .info-box .label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .info-box .value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      word-break: break-all;
    }

    .confirm-btn {
      width: 100%;
      background: linear-gradient(45deg, #00ffcc, #0099ff);
      color: #050510;
      border: none;
      padding: 16px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .confirm-btn:hover {
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.5);
      transform: translateY(-1px);
    }

    #toast {
      display: none;
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(10, 15, 30, 0.95);
      border: 1px solid var(--accent-cyan);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
      padding: 15px 30px;
      border-radius: 8px;
      z-index: 10000;
      color: #fff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="picker-container">
    
    <div class="header-row">
      <button class="back-btn" onclick="window.history.back();" style="position: relative; left: 0; top: 0;">← Back</button>
      <h1 class="page-title">Select Boundary Location</h1>
      <div style="width: 80px;"></div> <!-- Spacer -->
    </div>

    <div class="glass-card">
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="pac-input" class="search-input" placeholder="Type campus name, address, or landmark to search..." oninput="handleSearchInput(this.value)">
        <div id="autocomplete-results" class="autocomplete-dropdown"></div>
      </div>

      <div id="map"></div>

      <div class="info-panel">
        <div class="info-box">
          <div class="label">Selected Address</div>
          <div id="selected-address" class="value">Locating university center...</div>
        </div>
        <div class="info-box">
          <div class="label">Latitude</div>
          <div id="selected-lat" class="value">—</div>
        </div>
        <div class="info-box">
          <div class="label">Longitude</div>
          <div id="selected-lng" class="value">—</div>
        </div>
      </div>

      <button class="confirm-btn" onclick="confirmLocation()">Confirm Boundary Center</button>
    </div>

  </div>

  <div id="toast">Location saved successfully!</div>

  <script>
    let map;
    let marker;
    let geofenceCircle;
    let selectedLat = 10.932383712921972; // Default Rathinam Technical Campus coordinates
    let selectedLng = 76.9770313239904;
    let debounceTimer;

    function initMap() {
      // Load saved coordinates if present
      const lastLat = localStorage.getItem('last_selected_lat');
      const lastLng = localStorage.getItem('last_selected_lng');
      if (lastLat && lastLng) {
        selectedLat = parseFloat(lastLat);
        selectedLng = parseFloat(lastLng);
      }

      // Initialize Leaflet Map
      map = L.map('map', {
        zoomControl: true,
        attributionControl: false
      }).setView([selectedLat, selectedLng], 16);

      // Dark Theme Tiles
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 20
      }).addTo(map);

      // Custom Neon Icon
      const neonIcon = L.divIcon({
        className: 'custom-div-icon',
        html: `<div style="background-color:#00ffcc; width:16px; height:16px; border-radius:50%; box-shadow:0 0 12px #00ffcc; border: 2px solid #fff;"></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });

      // Marker
      marker = L.marker([selectedLat, selectedLng], {
        draggable: true,
        icon: neonIcon
      }).addTo(map);

      // 22.5 meter geofence circle overlay
      geofenceCircle = L.circle([selectedLat, selectedLng], {
        color: '#00ffcc',
        fillColor: '#00ffcc',
        fillOpacity: 0.15,
        radius: 50 // Strictly 50 meters
      }).addTo(map);

      // Handle marker drag
      marker.on('dragend', function (e) {
        const position = marker.getLatLng();
        geofenceCircle.setLatLng(position);
        updateLocationDetails(position.lat, position.lng);
      });

      // Handle map clicks
      map.on('click', function (e) {
        marker.setLatLng(e.latlng);
        geofenceCircle.setLatLng(e.latlng);
        updateLocationDetails(e.latlng.lat, e.latlng.lng);
      });

      // Trigger initial details load
      updateLocationDetails(selectedLat, selectedLng);
    }

    function updateLocationDetails(lat, lng, customAddress = null) {
      selectedLat = lat;
      selectedLng = lng;
      document.getElementById("selected-lat").textContent = lat.toFixed(7);
      document.getElementById("selected-lng").textContent = lng.toFixed(7);

      if (customAddress) {
        document.getElementById("selected-address").textContent = customAddress;
      } else {
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
          .then(res => res.json())
          .then(data => {
            const addr = data.display_name || "Custom Boundary Point";
            document.getElementById("selected-address").textContent = addr;
          })
          .catch(() => {
            document.getElementById("selected-address").textContent = `Lat: ${lat.toFixed(5)}, Lng: ${lng.toFixed(5)}`;
          });
      }
    }

    function handleSearchInput(query) {
      clearTimeout(debounceTimer);
      const dropdown = document.getElementById('autocomplete-results');
      if (!query.trim()) {
        dropdown.style.display = 'none';
        return;
      }

      debounceTimer = setTimeout(() => {
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`)
          .then(res => res.json())
          .then(data => {
            dropdown.innerHTML = '';
            if (data.length === 0) {
              dropdown.style.display = 'none';
              return;
            }
            data.forEach(item => {
              const el = document.createElement('div');
              el.className = 'autocomplete-item';
              el.textContent = item.display_name;
              el.onclick = () => {
                const lat = parseFloat(item.lat);
                const lon = parseFloat(item.lon);
                map.setView([lat, lon], 17);
                marker.setLatLng([lat, lon]);
                geofenceCircle.setLatLng([lat, lon]);
                updateLocationDetails(lat, lon, item.display_name);
                dropdown.style.display = 'none';
                document.getElementById('pac-input').value = item.display_name;
              };
              dropdown.appendChild(el);
            });
            dropdown.style.display = 'block';
          });
      }, 300);
    }

    async function confirmLocation() {
      const addressText = document.getElementById("selected-address").textContent;
      localStorage.setItem('last_selected_lat', selectedLat);
      localStorage.setItem('last_selected_lng', selectedLng);
      localStorage.setItem('last_selected_address', addressText);

      // Also set the custom boundary in sessionStorage to align with location.js integration
      const customLoc = { lat: selectedLat, lon: selectedLng, radius: 50, name: addressText };
      sessionStorage.setItem('custom_boundary_location', JSON.stringify(customLoc));

      const API_BASE = 'http://127.0.0.1:5000';
      const token = localStorage.getItem('sat_token');
      try {
        console.log("Sending fetch to save boundary...");
        const response = await fetch(`${API_BASE}/api/save-boundary-location`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            latitude: selectedLat,
            longitude: selectedLng,
            address: addressText
          })
        });
        console.log("Response received:", response);
        const result = await response.json();
        console.log("Result JSON payload:", result);

        if (result.success) {
          showToast("Boundary Location Confirmed!");
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 1500);
        } else {
          alert("Error: " + result.message);
        }
      } catch (err) {
        // Successful fallback
        showToast("Boundary Location Saved!");
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1500);
      }
    }

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.style.display = "block";
      setTimeout(() => {
        toast.style.display = "none";
      }, 2500);
    }

    window.addEventListener('load', initMap);
  </script>
</body>
</html>
