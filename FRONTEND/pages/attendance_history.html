<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Attendance — Attendance History</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
    }
    .history-card-premium {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
    }
    .history-card-premium:hover {
      border-color: rgba(0, 255, 204, 0.2);
      background: rgba(255, 255, 255, 0.04);
      transform: translateY(-1px);
    }
    .history-date {
      min-width: 130px;
    }
    .history-date-main {
      font-weight: 700;
      font-size: 15px;
      color: #ffffff;
    }
    .history-date-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .history-body {
      flex: 1;
      padding-left: 20px;
    }
    .history-time {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .history-gps {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .history-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .badge-present {
      background: rgba(56, 239, 125, 0.1) !important;
      color: #38ef7d !important;
      border: 1px solid #38ef7d !important;
      border-radius: 20px !important;
      padding: 4px 12px !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      text-transform: uppercase;
    }
    .badge-late {
      background: rgba(234, 179, 8, 0.1) !important;
      color: #fbbf24 !important;
      border: 1px solid #fbbf24 !important;
      border-radius: 20px !important;
      padding: 4px 12px !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      text-transform: uppercase;
    }
    .badge-absent {
      background: rgba(252, 74, 26, 0.1) !important;
      color: #fc4a1a !important;
      border: 1px solid #fc4a1a !important;
      border-radius: 20px !important;
      padding: 4px 12px !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      text-transform: uppercase;
    }

    .badge-success {
      background: rgba(56, 239, 125, 0.05) !important;
      color: #38ef7d !important;
      font-size: 11px !important;
      font-weight: 600 !important;
    }
    .badge-failed {
      background: rgba(252, 74, 26, 0.05) !important;
      color: #fc4a1a !important;
      font-size: 11px !important;
      font-weight: 600 !important;
    }

    .filter-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr) auto;
      gap: 16px;
      align-items: flex-end;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
    }

    .form-group-custom {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group-custom label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 700;
    }
    .form-control-custom {
      height: 40px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 0 12px;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
    }

    .stats-premium-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 25px;
    }
    .stat-card-prem {
      border-radius: 16px;
      padding: 20px;
      color: white;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .stat-card-prem.blue { background: var(--gradient-blue); }
    .stat-card-prem.green { background: var(--gradient-green); }
    .stat-card-prem.orange { background: var(--gradient-purple); }
    .stat-card-prem.red { background: var(--gradient-red); }
    
    .stat-card-prem i {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 20px;
      opacity: 0.3;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.8;
      font-weight: 700;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div id="sidebarContainer"></div>

<div class="main-content">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-title">Attendance History</div>
    <div class="top-bar-actions">
      <button class="btn btn-ghost" onclick="downloadCSV()" style="height: 38px; font-size: 13px; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;"><i class="fa-solid fa-file-csv" style="margin-right: 6px;"></i> Export CSV</button>
      <i class="fa-solid fa-bell top-bar-icon"></i>
      <div class="user-avatar" id="topBarAvatar" style="width:36px; height:36px;">S</div>
    </div>
  </div>

  <!-- Summary Stats Row -->
  <div class="stats-premium-grid">
    <div class="stat-card-prem blue">
      <i class="fa-solid fa-calculator"></i>
      <div class="stat-value" id="s-total">—</div>
      <div class="stat-label">Total Logs</div>
    </div>
    <div class="stat-card-prem green">
      <i class="fa-solid fa-circle-check"></i>
      <div class="stat-value" id="s-present">—</div>
      <div class="stat-label">Present</div>
    </div>
    <div class="stat-card-prem orange">
      <i class="fa-solid fa-clock"></i>
      <div class="stat-value" id="s-late">—</div>
      <div class="stat-label">Late</div>
    </div>
    <div class="stat-card-prem red">
      <i class="fa-solid fa-circle-xmark"></i>
      <div class="stat-value" id="s-absent">—</div>
      <div class="stat-label">Absent</div>
    </div>
  </div>

  <!-- Filters Row -->
  <div class="filter-row">
    <div class="form-group-custom">
      <label>Status</label>
      <select id="filter-status" class="form-control-custom" onchange="applyFilters()">
        <option value="">All Statuses</option>
        <option value="present">Present</option>
        <option value="late">Late</option>
        <option value="absent">Absent</option>
      </select>
    </div>
    <div class="form-group-custom">
      <label>From Date</label>
      <input type="date" id="filter-start" class="form-control-custom" onchange="applyFilters()" />
    </div>
    <div class="form-group-custom">
      <label>To Date</label>
      <input type="date" id="filter-end" class="form-control-custom" onchange="applyFilters()" />
    </div>
    <button class="btn btn-ghost" onclick="clearFilters()" style="height: 40px; font-weight: 600; padding: 0 16px; border-radius: 8px;">Clear</button>
  </div>

  <!-- Records List -->
  <div id="records-container">
    <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
      <i class="fa-solid fa-spinner fa-spin" style="font-size: 24px; color: var(--accent-cyan); margin-bottom: 12px;"></i>
      <div>Loading records…</div>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
const API = 'http://127.0.0.1:5000';
let allRecords = [];

// Load sidebar
fetch('../components/sidebar.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('sidebarContainer').innerHTML = html;
    initSidebar();
  });

function initSidebar() {
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const storedStudent = JSON.parse(localStorage.getItem('sat_student') || '{}');
  const email = user.email || storedStudent.email || localStorage.getItem('userEmail') || '';

  document.getElementById('sidebarName').textContent = user.name || storedStudent.name || 'Student';
  document.getElementById('sidebarSub').textContent = (user.department || storedStudent.department || '') + ' · ' + (user.section || storedStudent.class_section || '');
  document.getElementById('sidebarAvatar').textContent = (user.name || storedStudent.name || 'S').charAt(0).toUpperCase();
  document.getElementById('topBarAvatar').textContent = (user.name || storedStudent.name || 'S').charAt(0).toUpperCase();

  const adminSection = document.getElementById('adminNavSection');
  const adminList = document.getElementById('adminNavList');
  if (adminSection && adminList) {
    if (email === 'gowsicklitheswaran@gmail.com') {
      adminSection.style.display = 'block';
      adminList.style.display = 'block';
    } else {
      adminSection.style.display = 'none';
      adminList.style.display = 'none';
    }
  }

  // Active nav highlight
  document.querySelectorAll('.nav-item').forEach(item => {
    if (item.getAttribute('href') === '/history') {
      item.classList.add('active');
    }
  });
}

(async function init() {
  const token = localStorage.getItem('sat_token');
  if (!token) { window.location.href='login.html'; return; }

  // Load summary
  try {
    const res = await fetch(`${API}/api/attendance/summary`, { headers:{'Authorization':`Bearer ${token}`} });
    const d = await res.json();
    if (d.success && d.summary) {
      document.getElementById('s-total').textContent   = d.summary.total || 0;
      document.getElementById('s-present').textContent = d.summary.present_count || 0;
      document.getElementById('s-late').textContent    = d.summary.late_count || 0;
      document.getElementById('s-absent').textContent  = d.summary.absent_count || 0;
    }
  } catch(e){}

  // Load records
  await loadRecords();
})();

async function loadRecords() {
  const token = localStorage.getItem('sat_token');
  try {
    const res = await fetch(`${API}/api/attendance/history?limit=100`, {
      headers:{'Authorization':`Bearer ${token}`}
    });
    const d = await res.json();
    if (d.success) {
      allRecords = d.records || [];
      renderRecords(allRecords);
    }
  } catch(e) { console.error(e); }
}

function renderRecords(records) {
  const container = document.getElementById('records-container');
  if (!records.length) {
    container.innerHTML = `<div style="text-align:center; padding:50px; color:var(--text-muted);"><i class="fa-solid fa-folder-open" style="font-size: 32px; margin-bottom: 12px;"></i><div>No attendance records found</div></div>`;
    return;
  }
  container.innerHTML = records.map(r => {
    const statusClass = r.status === 'present' ? 'badge-present' : r.status === 'late' ? 'badge-late' : 'badge-absent';
    const faceClass   = r.face_match_status === 'success' ? 'badge-success' : 'badge-failed';
    const faceLabel   = r.face_match_status === 'success' ? 'Face OK' : r.face_match_status === 'failed' ? 'Face Fail' : '— Not tried';
    const lat = r.latitude ? parseFloat(r.latitude).toFixed(4) : '—';
    const lon = r.longitude ? parseFloat(r.longitude).toFixed(4) : '—';
    const date = new Date(r.date);
    const dateStr = date.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });

    return `<div class="history-card-premium">
      <div class="history-date">
        <div class="history-date-main">${dateStr}</div>
        <div class="history-date-sub">${date.toLocaleDateString('en-IN',{weekday:'long'})}</div>
      </div>
      <div class="history-body">
        <div class="history-time"><i class="fa-regular fa-clock" style="color:var(--accent-cyan); margin-right:6px;"></i> ${r.time || '—'}</div>
        <div class="history-gps"><i class="fa-solid fa-location-dot" style="color:var(--text-muted); margin-right:6px;"></i> ${lat}°N, ${lon}°E</div>
      </div>
      <div class="history-right">
        <span class="${statusClass}">${r.status}</span>
        <span class="badge ${faceClass}">${faceLabel}</span>
        ${r.face_confidence ? `<span style="font-size:0.75rem;color:var(--text-muted)">${(r.face_confidence*100).toFixed(0)}% match</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function applyFilters() {
  let filtered = [...allRecords];
  const status = document.getElementById('filter-status').value;
  const start  = document.getElementById('filter-start').value;
  const end    = document.getElementById('filter-end').value;

  if (status) filtered = filtered.filter(r => r.status === status);
  if (start)  filtered = filtered.filter(r => r.date >= start);
  if (end)    filtered = filtered.filter(r => r.date <= end);
  renderRecords(filtered);
}

function clearFilters() {
  document.getElementById('filter-status').value = '';
  document.getElementById('filter-start').value  = '';
  document.getElementById('filter-end').value    = '';
  renderRecords(allRecords);
}

function downloadCSV() {
  if (!allRecords.length) { showToast('No data to export', 'error'); return; }
  const cols = ['date','time','status','latitude','longitude','location_valid','face_match_status','face_confidence'];
  const rows = [cols.join(','), ...allRecords.map(r => cols.map(c => r[c] ?? '').join(','))];
  const blob = new Blob([rows.join('\n')], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `attendance_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  showToast('CSV downloaded!', 'success');
}
</script>
</body>
</html>
