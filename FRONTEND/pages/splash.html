<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCheck — Welcome</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0f1e;
      --accent-cyan: #00ffcc;
      --accent-blue: #4facfe;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      height: 100vh;
      background: var(--bg-dark);
      background: radial-gradient(circle at center, #16213e 0%, #0a0f1e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }

    /* The Splash Canvas Wrapper with subtle in-fade */
    .splash-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: entryFade 1s ease-out forwards;
    }

    /* 3D Animated Logo Container */
    .logo-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      perspective: 800px;
    }

    /* Multi-layer blinking rings */
    .pulsing-ring {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 3px solid var(--accent-cyan);
      animation: ringGlow 2.5s infinite ease-out;
      opacity: 0;
      z-index: 1;
      box-shadow: inset 0 0 20px rgba(0,255,204,0.3);
    }
    .pulsing-ring:nth-child(2) {
      animation-delay: 0.8s;
    }
    .pulsing-ring:nth-child(3) {
      animation-delay: 1.6s;
      border-color: var(--accent-blue);
    }

    /* 3D Icon sphere with inner glowing mechanics */
    .shield-orb {
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: var(--accent-cyan);
      border: 2px solid rgba(0, 255, 204, 0.4);
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.4), inset 0 0 25px rgba(0, 255, 204, 0.2);
      z-index: 10;
      transform-style: preserve-3d;
      animation: floatMotion 3s ease-in-out infinite alternate;
      margin-bottom: 25px;
    }

    .shield-orb i {
      filter: drop-shadow(0 0 15px rgba(0,255,204,0.7));
      animation: pulseIntensity 1.5s alternate infinite ease-in-out;
    }

    /* Large Dynamic Typography */
    .branding-text {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 20%, var(--accent-cyan) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 30px rgba(0, 255, 204, 0.2);
      z-index: 10;
      opacity: 0;
      transform: translateY(15px);
      animation: slideUpText 0.8s ease-out 0.3s forwards;
    }
    
    .loading-dots {
      display: flex;
      gap: 6px;
      margin-top: 20px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 1s forwards;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: var(--accent-cyan);
      border-radius: 50%;
      opacity: 0.6;
      animation: dotJump 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    /* Animations */
    @keyframes entryFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    @keyframes ringGlow {
      0% { transform: scale(0.6); opacity: 0.9; border-color: var(--accent-cyan); }
      100% { transform: scale(2.2); opacity: 0; border-color: transparent; }
    }
    
    @keyframes floatMotion {
      0% { transform: rotateX(10deg) rotateY(0deg) translateY(0px); }
      100% { transform: rotateX(25deg) rotateY(15deg) translateY(-15px); box-shadow: 0 25px 50px rgba(0, 255, 204, 0.6); }
    }
    
    @keyframes pulseIntensity {
      0% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(0,255,204,0.5)); }
      100% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(0,255,204,0.9)); }
    }

    @keyframes slideUpText { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { to { opacity: 1; } }
    
    @keyframes dotJump {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); background: #fff; opacity: 1; }
    }

    /* Smooth Exit Fadeout on Redirect */
    .fade-out {
        animation: exitFade 0.5s ease-in forwards !important;
    }
    @keyframes exitFade {
        to { opacity: 0; transform: scale(1.05); filter: blur(10px); }
    }

  </style>
</head>
<body>

  <div class="splash-wrapper" id="splashMain">
    <div class="logo-container">
      <div class="pulsing-ring"></div>
      <div class="pulsing-ring"></div>
      <div class="pulsing-ring"></div>
      <div class="shield-orb">
        <i class="fa-solid fa-shield-halved"></i>
      </div>
      <div class="branding-text">SmartCheck</div>
      
      <div class="loading-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <script>
    // Wait for 2.5 seconds, trigger visual fade-out effect, then push state to login.
    setTimeout(() => {
      document.getElementById('splashMain').classList.add('fade-out');
      setTimeout(() => {
          window.location.href = '/login';
      }, 400); // duration of fade-out animation
    }, 2500);
  </script>
</body>
</html>
