<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enable Location Access</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #0a0f1e;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
    }
    .card {
      background: #0b1120;
      border: 1px solid rgba(0, 255, 204, 0.4);
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.2);
      border-radius: 20px;
      padding: 50px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-sizing: border-box;
    }
    .icon-container {
      margin-bottom: 24px;
    }
    .icon-container i {
      font-size: 64px;
      color: #00ffcc;
      filter: drop-shadow(0 0 15px rgba(0, 255, 204, 0.5));
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 16px;
    }
    .subtitle {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 32px;
      line-height: 1.5;
      margin-left: auto;
      margin-right: auto;
      max-width: 360px;
    }
    .btn {
      width: 100%;
      height: 52px;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      border: none;
      margin-bottom: 16px;
    }
    .btn-primary {
      background: linear-gradient(180deg, #00d4c8, #00b4aa);
      color: #ffffff;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .btn-skip {
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-skip:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
    }
    .error-msg {
      background: rgba(220, 53, 69, 0.1);
      border-left: 4px solid #dc3545;
      color: #dc3545;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      margin-top: 16px;
      display: none;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <i class="fa-solid fa-location-dot"></i>
    </div>
    <div class="title">Enable Location Access</div>
    <div class="subtitle">We need your location to verify you are within the campus boundary.</div>
    
    <button class="btn btn-primary" onclick="requestLocation()" id="enableBtn">
      Enable Location
    </button>
    <button class="btn btn-skip" onclick="skipLocation()">
      Skip for now
    </button>
    
    <div class="error-msg" id="errorMsg">
      Location access denied. Please enable in browser settings.
    </div>
  </div>

  <script>
    if (!localStorage.getItem('sat_token')) {
      window.location.href = '/';
    }

    function requestLocation() {
      const btn = document.getElementById('enableBtn');
      const err = document.getElementById('errorMsg');
      btn.textContent = 'Requesting...';
      err.style.display = 'none';

      if (!navigator.geolocation) {
        err.textContent = 'Geolocation is not supported by your browser.';
        err.style.display = 'block';
        btn.textContent = 'Enable Location';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          localStorage.setItem('userLat', position.coords.latitude);
          localStorage.setItem('userLng', position.coords.longitude);
          window.location.href = 'boundary_select.html';
        },
        (error) => {
          console.error(error);
          err.textContent = 'Location access denied. Please enable in browser settings.';
          err.style.display = 'block';
          btn.textContent = 'Enable Location';
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function skipLocation() {
      window.location.href = 'boundary_select.html';
    }
  </script>
</body>
</html>
