<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Attendance — Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
    }
    .profile-header-premium {
      display: flex;
      align-items: center;
      gap: 32px;
      padding: 32px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1a1f35, #0d1117);
      border: 1px solid rgba(0, 255, 204, 0.1);
      margin-bottom: 30px;
      box-shadow: var(--shadow-card);
    }
    .profile-avatar-lg {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      border: 3px solid rgba(0, 255, 204, 0.4);
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0,255,204,0.2);
    }
    .profile-info h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #ffffff;
      margin: 0 0 4px 0;
    }
    .profile-info p {
      color: var(--text-secondary);
      font-size: 14px;
      margin: 0;
    }

    .info-grid-premium {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    .info-card-premium {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
    }
    .info-key {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .info-val {
      font-size: 14px;
      font-weight: 600;
      color: white;
    }

    .face-card-premium {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(0, 255, 204, 0.1);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      box-shadow: var(--shadow-card);
      margin-bottom: 30px;
    }
    .face-icon-premium {
      font-size: 36px;
      color: var(--accent-cyan);
    }

    @media (max-width: 768px) {
      .info-grid-premium {
        grid-template-columns: 1fr;
      }
      .profile-header-premium {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>

<div id="sidebarContainer"></div>

<div class="main-content">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-title">Student Profile</div>
    <div class="top-bar-actions">
      <i class="fa-solid fa-bell top-bar-icon"></i>
      <div class="user-avatar" id="topBarAvatar" style="width:36px; height:36px;">S</div>
    </div>
  </div>

  <!-- Profile Header Card -->
  <div class="profile-header-premium">
    <div class="profile-avatar-lg" id="profile-avatar">S</div>
    <div class="profile-info">
      <h2 id="profile-name">Loading Profile...</h2>
      <p id="profile-id">Student ID: —</p>
      <div style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;" id="profile-badges"></div>
    </div>
  </div>

  <!-- Info Grid -->
  <div class="info-grid-premium">
    <div class="info-card-premium">
      <div class="info-key"><i class="fa-solid fa-envelope" style="margin-right: 6px; color: var(--accent-cyan);"></i> Registered Email</div>
      <div class="info-val" id="p-email">—</div>
    </div>
    <div class="info-card-premium">
      <div class="info-key"><i class="fa-solid fa-phone" style="margin-right: 6px; color: var(--accent-cyan);"></i> Phone Number</div>
      <div class="info-val" id="p-phone">—</div>
    </div>
    <div class="info-card-premium">
      <div class="info-key"><i class="fa-solid fa-building" style="margin-right: 6px; color: var(--accent-cyan);"></i> Academic Department</div>
      <div class="info-val" id="p-dept">—</div>
    </div>
    <div class="info-card-premium">
      <div class="info-key"><i class="fa-solid fa-users" style="margin-right: 6px; color: var(--accent-cyan);"></i> Class Section</div>
      <div class="info-val" id="p-class">—</div>
    </div>
  </div>

  <!-- Face Enrollment Status -->
  <div class="face-card-premium">
    <div class="face-icon-premium">
      <i class="fa-solid fa-face-smile"></i>
    </div>
    <div style="flex: 1;">
      <div style="font-weight: 700; font-size: 15px; color: white; margin-bottom: 4px;">Face Recognition Enrollment</div>
      <div id="face-enroll-status" style="font-size: 13px; color: var(--text-secondary);">Checking enrollment status...</div>
    </div>
    <a href="face_scan.html" class="btn btn-primary" id="face-enroll-btn" style="height: 40px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 20px;">Enroll Face</a>
  </div>

  <!-- Actions Row -->
  <div style="display: flex; gap: 16px; flex-wrap: wrap;">
    <a href="face_scan.html" class="btn btn-primary" style="height: 44px; font-size: 14px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; padding: 0 24px;"><i class="fa-solid fa-camera" style="margin-right: 8px;"></i> Re-scan Face</a>
    <a href="attendance_history.html" class="btn btn-ghost" style="height: 44px; font-size: 14px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); color: white; display: inline-flex; align-items: center; justify-content: center; padding: 0 24px;"><i class="fa-solid fa-clock-rotate-left" style="margin-right: 8px;"></i> View History</a>
    <button class="btn btn-danger" onclick="handleLogout()" style="height: 44px; font-size: 14px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; padding: 0 24px;"><i class="fa-solid fa-power-off" style="margin-right: 8px;"></i> Logout</button>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
  // Load sidebar
  fetch('../components/sidebar.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('sidebarContainer').innerHTML = html;
      initSidebar();
    });

  function initSidebar() {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const storedStudent = JSON.parse(localStorage.getItem('sat_student') || '{}');
    const email = user.email || storedStudent.email || localStorage.getItem('userEmail') || '';

    document.getElementById('sidebarName').textContent = user.name || storedStudent.name || 'Student';
    document.getElementById('sidebarSub').textContent = (user.department || storedStudent.department || '') + ' · ' + (user.section || storedStudent.class_section || '');
    document.getElementById('sidebarAvatar').textContent = (user.name || storedStudent.name || 'S').charAt(0).toUpperCase();
    document.getElementById('topBarAvatar').textContent = (user.name || storedStudent.name || 'S').charAt(0).toUpperCase();

    const adminSection = document.getElementById('adminNavSection');
    const adminList = document.getElementById('adminNavList');
    if (adminSection && adminList) {
      if (email === 'gowsicklitheswaran@gmail.com') {
        adminSection.style.display = 'block';
        adminList.style.display = 'block';
      } else {
        adminSection.style.display = 'none';
        adminList.style.display = 'none';
      }
    }

    // Active nav highlight
    document.querySelectorAll('.nav-item').forEach(item => {
      if (item.getAttribute('href') === '/profile') {
        item.classList.add('active');
      }
    });
  }

  (async function loadProfile() {
    const token = localStorage.getItem('sat_token');
    if (!token) { window.location.href = 'login.html'; return; }

    try {
      const res = await fetch('/api/student/profile', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (!data.success) { window.location.href = 'login.html'; return; }
      const s = data.student;

      document.getElementById('profile-avatar').textContent = s.name[0].toUpperCase();
      document.getElementById('profile-name').textContent    = s.name;
      document.getElementById('profile-id').textContent      = `Student ID: ${s.student_id}`;
      document.getElementById('p-email').textContent         = s.email;
      document.getElementById('p-phone').textContent         = s.phone || 'Not set';
      document.getElementById('p-dept').textContent          = s.department;
      document.getElementById('p-class').textContent         = s.class_name;

      const badges = document.getElementById('profile-badges');
      badges.innerHTML = `
        <span class="badge" style="background: rgba(56,239,125,0.1); color: #38ef7d; font-size:11px; font-weight:700; border:1px solid #38ef7d; border-radius:20px; padding:4px 12px; text-transform:uppercase;">${s.department}</span>
        <span class="badge" style="background: rgba(0,255,204,0.1); color: var(--accent-cyan); font-size:11px; font-weight:700; border:1px solid var(--accent-cyan); border-radius:20px; padding:4px 12px; text-transform:uppercase;">${s.class_name}</span>`;

      const faceStatus = document.getElementById('face-enroll-status');
      const faceBtn    = document.getElementById('face-enroll-btn');
      if (s.face_enrolled) {
        faceStatus.innerHTML = `<span style="color:#38ef7d; font-weight: 600;">Face enrolled — Ready for attendance</span>`;
        faceBtn.textContent = 'Update Face';
      } else {
        faceStatus.innerHTML = `<span style="color:#fc4a1a; font-weight: 600;">Face not enrolled — Please scan your face to enable attendance</span>`;
      }
    } catch(e) {
      console.error(e);
    }
  })();
</script>
</body>
</html>
